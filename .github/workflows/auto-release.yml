name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - "icons/**"
      - "icons-solid/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tags.json"

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '(release):') }}
    steps:
      - name: Require release token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "RELEASE_TOKEN is required so automation-created tags trigger release.yml."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Lint
        run: bun run lint

      - name: Build release artifacts
        run: bun run release:build

      - name: Detect release-relevant changes
        id: changes
        run: bun run release:diff

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        id: bump
        run: bun run release:bump

      - name: Rebuild with release version
        if: steps.changes.outputs.changed == 'true'
        run: bun run release:build

      - name: Configure git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag release
        if: steps.changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add package.json packages/icons/package.json packages/icons-react/package.json tags.json packages/icons/meta.json
          git add packages/icons/mynaui* packages/icons/icons packages/icons/icons-solid
          git commit -m "chore(release): v${VERSION}"
          git tag -a "v${VERSION}" -m "v${VERSION}"

      - name: Push release commit and tag
        if: steps.changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
          git push origin "v${VERSION}"
